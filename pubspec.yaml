name: speakout_app
description: "SpeakOut E-Course: Aplikasi belajar public speaking & bahasa Inggris."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7  # ✅ Package dependency (hanya ini yang masuk sini)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ✅ KONFIGURASI SPLASH SCREEN (Letak: ROOT LEVEL, sejajar dengan dependencies)
flutter_native_splash:
  color: "#667eea"           # Warna background gradient SpeakOut
  image: assets/logospeakout.png     # Path logo (harus ada file-nya!)
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
  
  # ✅ DAFTAR ASSETS (Logo, images, dll)
  assets:
    - assets/logospeakout.png